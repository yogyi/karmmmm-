kind = "web"
previewPath = "/"
title = "Karm Baba Marketplace"
version = "1.0.0"
id = "artifacts/karm-baba"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18613

[services.development]
run = "pnpm --filter @workspace/karm-baba run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/karm-baba", "run", "build" ]
publicDir = "artifacts/karm-baba/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18613"
BASE_PATH = "/"
